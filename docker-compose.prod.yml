# N-SLMCRS 生产部署 compose（bind-mount 主机目录，适配裸机/systemd 已有的 /opt/n-slmcrs/data）。
#
# 与 docker-compose.yml 的区别：
#   - 用 bind-mount /opt/n-slmcrs/data:/data（非命名卷），复用 systemd 装机时已创建的数据目录与权限
#   - 镜像 tag 由 TAG 环境变量驱动（默认 v0.14.0），与主 compose 一致
#
# 启动：
#   TAG=v0.14.0 docker compose -f docker-compose.prod.yml up -d
#   bash scripts/deploy.sh v0.14.0   # 自动探测并使用本文件（若存在）

services:
  gateway:
    image: ghcr.io/xiaoli0412/n-slmcrs-gateway:${TAG:-v0.14.0}
    container_name: nslmcrs-gateway
    restart: unless-stopped
    # 以 uid 998 运行，与 /opt/n-slmcrs/data 属主（主机 nslmcrs=998）对齐，
    # 避免 root 写入致 DB/WAL 文件属主漂移（否则切回 998 时不可读写）。
    user: "998:998"
    ports:
      - "${PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      SQLITE_PATH: /data/nslmcrs.db
      GIN_MODE: release
      KERNEL_URL: http://kernel:8790
      # 热路径 fail-closed（0=降级/1=硬依赖；浸泡期保持 0）
      KERNEL_FAIL_CLOSED: ${KERNEL_FAIL_CLOSED:-0}
      BACKUP_DIR: /data/backups
    volumes:
      - /opt/n-slmcrs/data:/data
    depends_on:
      - kernel
    healthcheck:
      test: ["CMD", "/gateway", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kernel:
    image: ghcr.io/xiaoli0412/n-slmcrs-kernel:${TAG:-v0.14.0}
    container_name: nslmcrs-kernel
    restart: unless-stopped
    # 以 uid 998 运行，与 /opt/n-slmcrs 属主对齐，确保可写 /data/kernel.db
    user: "998:998"
    expose:
      - "8790"
    environment:
      KERNEL_DB_PATH: /data/kernel.db
    volumes:
      - /opt/n-slmcrs/kernel-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8790/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
