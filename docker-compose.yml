# N-SLMCRS 网关 docker-compose 编排。
#
# 启动：
#   docker compose up -d            # 本地已 build 或服务器已 pull 时
#   docker compose build            # 本地构建（开发用）
#   TAG=v0.10.0 docker compose pull  # 服务器从 ghcr 拉取已发布镜像
#
# 生产部署（scripts/deploy.sh 自动执行）：
#   git pull && docker compose pull && docker compose up -d
#
# 首次启动前：复制 .env.example 为 .env 并填入 ADMIN_TOKEN 等。
# Rust 内核 sidecar（kernel）可选：Auto-Pilot 预测/可用度计算委托之；
# 设 KERNEL_DISABLE=1 可禁用（网关降级回纯 Go 实现，无单点依赖）。

services:
  gateway:
    build: .
    image: ghcr.io/xiaoli0412/n-slmcrs-gateway:${TAG:-v0.10.0}
    container_name: nslmcrs-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      # 容器内固定路径（覆盖默认值）
      SQLITE_PATH: /data/nslmcrs.db
      GIN_MODE: release
      # 指向 Rust 内核 sidecar（容器名:端口）；不可用时自动降级
      KERNEL_URL: http://kernel:8790
      # 备份目录落在持久卷上，容器重建后备份仍在
      BACKUP_DIR: /data/backups
    volumes:
      # SQLite 数据持久化（命名卷）
      - nslmcrs-data:/data
    depends_on:
      - kernel
    healthcheck:
      test: ["CMD", "/gateway", "-version"]
      # distroless 无 wget/curl，简化为进程存活检测；生产可加 sidecar
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Rust 内核 sidecar：Holt-Winters 预测 + 可用度聚合（数值密集计算）。
  # 网关不可达此服务时降级回内置 Go 实现，故 healthcheck 失败不阻断网关。
  kernel:
    build:
      context: .
      dockerfile: Dockerfile.kernel
    image: ghcr.io/xiaoli0412/n-slmcrs-kernel:${TAG:-v0.10.0}
    container_name: nslmcrs-kernel
    restart: unless-stopped
    expose:
      - "8790"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8790/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  nslmcrs-data:
    driver: local
