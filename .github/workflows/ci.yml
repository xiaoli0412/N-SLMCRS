name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 先构建前端，使 internal/entry/dist 存在（//go:embed dist/* 需要）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build web
        working-directory: web
        run: npm ci --no-audit --no-fund && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o /tmp/gateway ./cmd/gateway

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci --no-audit --no-fund
      - name: Build
        working-directory: web
        run: npm run build

  # 标签推送时构建并推送双镜像到 ghcr（本机无 Docker 时的发布通道）。
  # 仓库为 public，镜像默认 public，服务器可免鉴权 docker pull。
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [go, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push gateway
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/n-slmcrs-gateway:latest \
                       -t ghcr.io/${{ github.repository_owner }}/n-slmcrs-gateway:${{ steps.meta.outputs.tag }} \
                       -f Dockerfile .
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/n-slmcrs-gateway
      - name: Build & push kernel
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/n-slmcrs-kernel:latest \
                       -t ghcr.io/${{ github.repository_owner }}/n-slmcrs-kernel:${{ steps.meta.outputs.tag }} \
                       -f Dockerfile.kernel .
          docker push --all-tags ghcr.io/${{ github.repository_owner }}/n-slmcrs-kernel
